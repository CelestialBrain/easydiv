<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyDiv</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            width: 380px;
            background: linear-gradient(145deg, #0f0f12 0%, #1a1a1f 100%);
            color: #f4f4f5;
            overflow: hidden;
        }

        /* Header */
        .header {
            padding: 20px 20px 16px;
            background: linear-gradient(180deg, rgba(139, 92, 246, 0.08) 0%, transparent 100%);
            border-bottom: 1px solid rgba(139, 92, 246, 0.15);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .header-content {
            position: relative;
            z-index: 1;
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #c4b5fd, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .header p {
            font-size: 12px;
            color: #71717a;
            font-weight: 400;
        }

        /* Controls Section */
        .controls {
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        /* Button Base */
        button {
            width: 100%;
            padding: 12px 16px;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* Primary Button - Inspector */
        #toggle-inspector {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            box-shadow: 0 4px 16px -4px rgba(59, 130, 246, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        #toggle-inspector:hover {
            box-shadow: 0 8px 24px -4px rgba(59, 130, 246, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        #toggle-inspector.active {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            box-shadow: 0 4px 16px -4px rgba(239, 68, 68, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        #toggle-inspector::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Button Row */
        .row {
            display: flex;
            gap: 10px;
        }

        .row button {
            flex: 1;
        }

        /* Copy Page Button */
        #copy-full-page {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            box-shadow: 0 4px 12px -4px rgba(34, 197, 94, 0.4);
        }

        #copy-full-page:hover {
            box-shadow: 0 6px 20px -4px rgba(34, 197, 94, 0.5);
        }

        /* Preview Button */
        #preview-design {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            box-shadow: 0 4px 12px -4px rgba(139, 92, 246, 0.4);
        }

        #preview-design:hover {
            box-shadow: 0 6px 20px -4px rgba(139, 92, 246, 0.5);
        }

        /* Clear Button */
        #clear-dock {
            background: rgba(39, 39, 42, 0.8);
            border: 1px solid rgba(63, 63, 70, 0.5);
            box-shadow: 0 2px 8px -2px rgba(0, 0, 0, 0.3);
            color: #a1a1aa;
        }

        #clear-dock:hover {
            background: rgba(63, 63, 70, 0.8);
            color: #fafafa;
            border-color: rgba(82, 82, 91, 0.8);
        }

        /* Status Message */
        #status-message {
            font-size: 11px;
            margin-top: 4px;
            text-align: center;
            color: #71717a;
            min-height: 16px;
            font-weight: 500;
        }

        /* Dock Header */
        .dock-header {
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .dock-header span {
            font-size: 11px;
            color: #71717a;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .dock-header .count {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(99, 102, 241, 0.2));
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            color: #a78bfa;
            font-weight: 700;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        /* Dock Container */
        .dock-container {
            max-height: 320px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #3f3f46 transparent;
        }

        .dock-container::-webkit-scrollbar {
            width: 6px;
        }

        .dock-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .dock-container::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 3px;
        }

        .dock-container::-webkit-scrollbar-thumb:hover {
            background: #52525b;
        }

        /* Empty State */
        .empty-state {
            padding: 40px 24px;
            text-align: center;
            color: #52525b;
        }

        .empty-state .icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 16px;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border: 1px dashed rgba(139, 92, 246, 0.3);
        }

        .empty-state h3 {
            font-size: 14px;
            color: #a1a1aa;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .empty-state p {
            font-size: 12px;
            line-height: 1.5;
            color: #71717a;
        }

        /* Dock Item */
        .dock-item {
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding: 14px 20px;
            transition: background 0.15s ease;
        }

        .dock-item:hover {
            background: rgba(139, 92, 246, 0.04);
        }

        .dock-item:last-child {
            border-bottom: none;
        }

        .dock-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .dock-item-meta {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dock-item-source {
            font-size: 11px;
            color: #a78bfa;
            font-weight: 600;
            background: rgba(139, 92, 246, 0.12);
            padding: 4px 8px;
            border-radius: 6px;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .dock-item-time {
            font-size: 10px;
            color: #52525b;
            font-weight: 500;
        }

        .dock-item-actions {
            display: flex;
            gap: 6px;
        }

        .dock-item-actions button {
            width: auto;
            padding: 6px 10px;
            font-size: 10px;
            font-weight: 600;
            border-radius: 6px;
            min-width: 42px;
        }

        .dock-item-actions .btn-copy-raw {
            background: rgba(63, 63, 70, 0.8);
            color: #d4d4d8;
        }

        .dock-item-actions .btn-copy-raw:hover {
            background: rgba(82, 82, 91, 0.9);
            color: #fff;
        }

        .dock-item-actions .btn-copy-tw {
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            color: white;
            box-shadow: 0 2px 8px -2px rgba(6, 182, 212, 0.4);
        }

        .dock-item-actions .btn-copy-tw:hover {
            box-shadow: 0 4px 12px -2px rgba(6, 182, 212, 0.5);
        }

        .dock-item-actions .btn-view {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
            box-shadow: 0 2px 8px -2px rgba(139, 92, 246, 0.4);
        }

        .dock-item-actions .btn-view:hover {
            box-shadow: 0 4px 12px -2px rgba(139, 92, 246, 0.5);
        }

        .dock-item-actions .btn-delete {
            background: transparent;
            color: #52525b;
            padding: 6px 8px;
            min-width: auto;
        }

        .dock-item-actions .btn-delete:hover {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
        }

        /* Preview Box */
        .preview-box {
            background: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            height: 100px;
            overflow: hidden;
            position: relative;
        }

        .preview-box iframe {
            width: 250%;
            height: 250px;
            border: none;
            transform-origin: top left;
            transform: scale(0.4);
            pointer-events: none;
            background: #fff;
        }

        .preview-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: linear-gradient(transparent, rgba(255, 255, 255, 0.9));
            pointer-events: none;
        }

        /* Animations */
        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }

        .loading {
            animation: pulse 1.5s ease infinite;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="header-content">
            <div class="logo-row">
                <div class="logo-icon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        <line x1="9" y1="3" x2="9" y2="21" />
                    </svg>
                </div>
                <h1>EasyDiv</h1>
            </div>
            <p>Capture any UI component with Tailwind CSS</p>
        </div>
    </div>

    <div class="controls">
        <button id="toggle-inspector">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <line x1="22" y1="12" x2="18" y2="12" />
                <line x1="6" y1="12" x2="2" y2="12" />
                <line x1="12" y1="6" x2="12" y2="2" />
                <line x1="12" y1="22" x2="12" y2="18" />
            </svg>
            Activate Inspector
        </button>

        <div class="row">
            <button id="copy-full-page">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                </svg>
                Copy Page
            </button>
            <button id="preview-design">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                </svg>
                Preview
            </button>
        </div>

        <div class="row">
            <button id="clear-dock">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6" />
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                </svg>
                Clear All
            </button>
        </div>

        <div id="status-message"></div>
    </div>

    <div class="dock-header">
        <span>Captured Components</span>
        <span class="count" id="dock-count">0</span>
    </div>

    <div id="dock-list" class="dock-container">
        <!-- Items rendered here -->
    </div>

    <script src="popup.js"></script>
</body>

</html>
