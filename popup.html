<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyDiv</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           EasyDiv — monotone dark + green accent (Claude Code aesthetic)
           ============================================================ */
        :root {
            --bg-0: #0a0a0a;       /* app bg */
            --bg-1: #121214;       /* panels */
            --bg-2: #18181b;       /* buttons idle */
            --bg-3: #27272a;       /* buttons hover */
            --border-0: #1f1f22;   /* subtle divider */
            --border-1: #2a2a2e;   /* default border */
            --border-2: #3f3f46;   /* emphasized border */
            --text-0: #ededed;     /* primary */
            --text-1: #a1a1aa;     /* secondary */
            --text-2: #71717a;     /* tertiary */
            --text-3: #52525b;     /* muted */
            --accent: #22c55e;     /* green-500 */
            --accent-dim: rgba(34, 197, 94, 0.12);
            --accent-border: rgba(34, 197, 94, 0.3);
            --accent-bright: #4ade80;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
            /* Fill 380px in the toolbar popup, stretch in the DevTools panel. */
            width: 100%;
            min-width: 380px;
            height: 100vh;
            min-height: 500px;
            background: var(--bg-0);
            color: var(--text-0);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-feature-settings: "cv02", "cv03", "cv04", "cv11";
        }

        /* ===== Header ===== */
        .header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-0);
            flex-shrink: 0;
            background: var(--bg-0);
        }

        .header::before { display: none; }
        .header-content { position: relative; }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
        }

        .logo-icon {
            width: 22px;
            height: 22px;
            background: var(--bg-2);
            border: 1px solid var(--border-2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
        }

        .header h1 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-0);
            letter-spacing: -0.01em;
        }

        .header p {
            font-size: 11px;
            color: var(--text-2);
            font-weight: 400;
        }

        /* ===== Controls ===== */
        .controls {
            padding: 12px 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-bottom: 1px solid var(--border-0);
            flex-shrink: 0;
            background: var(--bg-0);
        }

        button {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--border-1);
            background: var(--bg-2);
            color: var(--text-0);
            cursor: pointer;
            border-radius: 6px;
            font-weight: 500;
            font-size: 12px;
            transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: inherit;
        }

        button:hover {
            background: var(--bg-3);
            border-color: var(--border-2);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        button svg { opacity: 0.85; }

        /* Primary (active) Inspector — green accent */
        #toggle-inspector {
            background: var(--accent-dim);
            border-color: var(--accent-border);
            color: var(--accent-bright);
        }
        #toggle-inspector:hover {
            background: rgba(34, 197, 94, 0.18);
            border-color: rgba(34, 197, 94, 0.5);
        }
        #toggle-inspector.active {
            background: rgba(239, 68, 68, 0.12);
            border-color: rgba(239, 68, 68, 0.35);
            color: #fca5a5;
        }

        /* Row layout */
        .row { display: flex; gap: 8px; }
        .row button { flex: 1; }

        /* Scrape button — most emphasized, uses green fill */
        #scrape-page {
            background: var(--accent);
            border-color: var(--accent);
            color: #052e16;
            font-weight: 600;
        }
        #scrape-page:hover {
            background: var(--accent-bright);
            border-color: var(--accent-bright);
        }

        /* Secondary actions */
        #preview-design, #copy-full-page, #clear-dock { color: var(--text-1); }

        /* Status Message */
        #status-message {
            font-size: 11px;
            margin-top: 2px;
            text-align: center;
            color: var(--text-2);
            min-height: 16px;
            font-weight: 500;
        }

        /* Category filter pills are already inline-styled in JS; we just set font */
        #category-filter { font-family: inherit; }

        /* ===== Dock Header ===== */
        .dock-header {
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-0);
            border-bottom: 1px solid var(--border-0);
            flex-shrink: 0;
        }

        .dock-header span {
            font-size: 10px;
            color: var(--text-2);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .dock-header .count {
            background: var(--accent-dim);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            color: var(--accent-bright);
            font-weight: 600;
            border: 1px solid var(--accent-border);
            letter-spacing: 0;
            text-transform: none;
        }

        /* ===== Dock Container ===== */
        .dock-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: var(--border-2) transparent;
            background: var(--bg-0);
        }

        .dock-container::-webkit-scrollbar { width: 6px; }
        .dock-container::-webkit-scrollbar-track { background: transparent; }
        .dock-container::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
        .dock-container::-webkit-scrollbar-thumb:hover { background: #52525b; }

        /* ===== Empty State ===== */
        .empty-state {
            padding: 40px 24px;
            text-align: center;
            color: var(--text-3);
        }

        .empty-state .icon {
            width: 40px;
            height: 40px;
            margin: 0 auto 14px;
            background: var(--bg-2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            border: 1px dashed var(--border-2);
            color: var(--text-2);
        }

        .empty-state h3 {
            font-size: 13px;
            color: var(--text-1);
            margin-bottom: 4px;
            font-weight: 500;
        }

        .empty-state p {
            font-size: 11px;
            line-height: 1.5;
            color: var(--text-2);
        }

        /* ===== Dock Item ===== */
        .dock-item {
            border-bottom: 1px solid var(--border-0);
            padding: 10px 16px;
            transition: background 0.12s ease;
        }

        .dock-item:hover { background: rgba(255, 255, 255, 0.02); }
        .dock-item:last-child { border-bottom: none; }

        .dock-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            gap: 8px;
        }

        .dock-item-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
            flex: 1;
        }

        .dock-item-source {
            font-size: 10px;
            color: var(--text-1);
            font-weight: 500;
            background: var(--bg-2);
            border: 1px solid var(--border-1);
            padding: 2px 7px;
            border-radius: 4px;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .dock-item-time {
            font-size: 10px;
            color: var(--text-3);
            font-weight: 400;
        }

        .dock-item-actions { display: flex; gap: 4px; flex-shrink: 0; }

        .dock-item-actions button {
            width: auto;
            padding: 4px 8px;
            font-size: 10px;
            font-weight: 500;
            border-radius: 4px;
            min-width: 0;
            letter-spacing: 0.02em;
        }

        /* Copy dropdown trigger + View button share the monotone surface.
           Individual copy modes live behind the dropdown to reduce visual noise. */
        .dock-item-actions .btn-copy-menu,
        .dock-item-actions .btn-view {
            background: var(--bg-2);
            border: 1px solid var(--border-1);
            color: var(--text-1);
            box-shadow: none;
        }

        .dock-item-actions .btn-copy-menu:hover,
        .dock-item-actions .btn-view:hover {
            background: var(--bg-3);
            border-color: var(--accent-border);
            color: var(--accent-bright);
            transform: none;
        }

        .dock-item-actions .btn-copy-menu {
            gap: 4px;
            padding-right: 6px;
        }
        .dock-item-actions .btn-copy-menu .chev { opacity: 0.6; }

        /* The menu itself — a floating panel of 4 copy-mode options. */
        .copy-menu { position: relative; }
        .copy-menu-panel {
            position: absolute;
            top: calc(100% + 4px);
            right: 0;
            min-width: 140px;
            background: var(--bg-1);
            border: 1px solid var(--border-2);
            border-radius: 6px;
            box-shadow: 0 10px 24px -6px rgba(0, 0, 0, 0.7), 0 2px 6px rgba(0, 0, 0, 0.4);
            z-index: 200;
            padding: 4px;
            display: flex;
            flex-direction: column;
            gap: 1px;
        }
        .copy-menu-panel[hidden] { display: none; }
        .copy-menu-panel button {
            width: 100%;
            justify-content: space-between;
            padding: 6px 10px;
            font-size: 11px;
            font-weight: 500;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-0);
            border-radius: 4px;
            text-align: left;
        }
        .copy-menu-panel button:hover {
            background: var(--bg-3);
            color: var(--accent-bright);
            border-color: var(--accent-border);
        }
        .copy-menu-panel .menu-hint {
            font-size: 9px;
            color: var(--text-3);
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        .dock-item-actions .btn-delete {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-3);
            padding: 4px 6px;
            min-width: 0;
        }

        .dock-item-actions .btn-delete:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.25);
            color: #fca5a5;
        }

        /* ===== Preview Box ===== */
        .preview-box {
            background: var(--bg-1);
            border: 1px solid var(--border-1);
            border-radius: 6px;
            height: 70px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
        }

        .preview-box.size-small { height: 40px; }
        .preview-box.size-medium { height: 60px; }
        .preview-box.size-large { height: 80px; }

        .preview-box iframe {
            border: none;
            pointer-events: none;
            background: transparent;
        }

        .preview-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 12px;
            background: linear-gradient(transparent, var(--bg-0));
            pointer-events: none;
        }

        /* Animations */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .loading { animation: pulse 1.5s ease infinite; }
    </style>
</head>

<body>
    <div class="header">
        <div class="header-content">
            <div class="logo-row">
                <div class="logo-icon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        <line x1="9" y1="3" x2="9" y2="21" />
                    </svg>
                </div>
                <h1>EasyDiv</h1>
                <div style="margin-left:auto; display:flex; gap:4px;">
                    <button id="open-decompiler" title="Extension inspector" style="
                        padding:4px 6px; width:auto; font-size:11px;
                        background:transparent; border:1px solid var(--border-1);
                        color:var(--text-2); border-radius:5px;">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
                        </svg>
                    </button>
                    <button id="open-options" title="Settings" style="
                        padding:4px 6px; width:auto; font-size:11px;
                        background:transparent; border:1px solid var(--border-1);
                        color:var(--text-2); border-radius:5px;">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                        </svg>
                    </button>
                </div>
            </div>
            <p>Capture any UI component with Tailwind CSS</p>
        </div>
    </div>

    <div class="controls">
        <button id="toggle-inspector">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <line x1="22" y1="12" x2="18" y2="12" />
                <line x1="6" y1="12" x2="2" y2="12" />
                <line x1="12" y1="6" x2="12" y2="2" />
                <line x1="12" y1="22" x2="12" y2="18" />
            </svg>
            Activate Inspector
        </button>

        <div class="row">
            <button id="scrape-page">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                Scrape Page
            </button>
            <button id="preview-design">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                </svg>
                Preview
            </button>
        </div>

        <div class="row">
            <button id="copy-full-page">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                </svg>
                Copy Page
            </button>
            <button id="clear-dock">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6" />
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                </svg>
                Clear All
            </button>
        </div>

        <div id="category-filter" style="display:none; gap:4px; flex-wrap:wrap; padding:4px 0;">
            <!-- Category pills rendered by popup.js -->
        </div>

        <div id="status-message"></div>
    </div>

    <div class="dock-header">
        <span>Captured Components</span>
        <span class="count" id="dock-count">0</span>
    </div>

    <div id="dock-list" class="dock-container">
        <!-- Items rendered here -->
    </div>

    <script src="popup.js"></script>
</body>

</html>
