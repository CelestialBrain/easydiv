<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyDiv</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            width: 280px;
            background: #18181b;
            color: white;
        }

        .header {
            padding: 16px;
            border-bottom: 1px solid #27272a;
            background: linear-gradient(180deg, rgba(139, 92, 246, 0.1) 0%, transparent 100%);
        }

        .header h1 {
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header h1 .logo {
            background: linear-gradient(135deg, #8b5cf6, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 11px;
            color: #71717a;
            margin-top: 4px;
        }

        .controls {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-bottom: 1px solid #27272a;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 6px;
            font-weight: 500;
            font-size: 13px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #toggle-inspector {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            box-shadow: 0 4px 12px -3px rgba(59, 130, 246, 0.4);
        }

        #toggle-inspector.active {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            box-shadow: 0 4px 12px -3px rgba(239, 68, 68, 0.4);
        }

        #copy-full-page {
            background: #10b981;
        }

        #preview-design {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            box-shadow: 0 4px 12px -3px rgba(139, 92, 246, 0.4);
        }

        .row {
            display: flex;
            gap: 8px;
        }

        .row button {
            flex: 1;
        }

        #clear-dock {
            background: #27272a;
            border: 1px solid #3f3f46;
        }

        #status-message {
            font-size: 11px;
            margin-top: 8px;
            text-align: center;
            color: #a1a1aa;
            min-height: 16px;
        }

        .dock-header {
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #27272a;
        }

        .dock-header span {
            font-size: 12px;
            color: #71717a;
        }

        .dock-header .count {
            background: #27272a;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            color: #8b5cf6;
        }

        .dock-container {
            max-height: 300px;
            overflow-y: auto;
        }

        .dock-container::-webkit-scrollbar {
            width: 4px;
        }

        .dock-container::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 2px;
        }

        .empty-state {
            padding: 30px 20px;
            text-align: center;
            color: #52525b;
        }

        .empty-state .icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .empty-state h3 {
            font-size: 13px;
            color: #71717a;
            margin-bottom: 4px;
        }

        .empty-state p {
            font-size: 11px;
            line-height: 1.4;
        }

        .dock-item {
            border-bottom: 1px solid #27272a;
            padding: 10px 12px;
        }

        .dock-item:hover {
            background: rgba(139, 92, 246, 0.05);
        }

        .dock-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .dock-item-meta {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dock-item-source {
            font-size: 10px;
            color: #8b5cf6;
            font-weight: 500;
            background: rgba(139, 92, 246, 0.1);
            padding: 2px 6px;
            border-radius: 3px;
        }

        .dock-item-time {
            font-size: 10px;
            color: #52525b;
        }

        .dock-item-actions {
            display: flex;
            gap: 4px;
        }

        .dock-item-actions button {
            width: auto;
            padding: 4px 8px;
            font-size: 10px;
            background: #27272a;
        }

        .dock-item-actions .btn-copy-raw:hover,
        .dock-item-actions .btn-copy-tw:hover {
            opacity: 1;
        }

        .dock-item-actions .btn-copy-raw {
            background: #3f3f46;
        }

        .dock-item-actions .btn-copy-tw {
            background: #06b6d4;
            /* cyan-500 */
        }

        .dock-item-actions .btn-view:hover {
            background: #3b82f6;
        }

        .dock-item-actions .btn-delete {
            background: transparent;
            color: #52525b;
            padding: 4px 6px;
        }

        .dock-item-actions .btn-delete:hover {
            background: #ef4444;
            color: white;
        }

        .preview-box {
            background: #0a0a0b;
            border: 1px solid #27272a;
            border-radius: 6px;
            padding: 8px;
            max-height: 80px;
            overflow: hidden;
            position: relative;
        }

        .preview-box iframe {
            width: 100%;
            height: 100%;
            border: none;
            transform-origin: top left;
            transform: scale(0.4);
            pointer-events: none;
        }

        .preview-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: linear-gradient(transparent, #0a0a0b);
        }
    </style>
</head>

<body>
    <div class="header">
        <h1><span class="logo">EasyDiv</span></h1>
        <p>Steal any UI component with Tailwind CSS</p>
    </div>

    <div class="controls">
        <button id="toggle-inspector">Activate Inspector</button>

        <div class="row">
            <button id="copy-full-page">Copy Page</button>
            <button id="preview-design">Preview</button>
        </div>

        <div class="row">
            <button id="clear-dock">Clear All</button>
        </div>

        <div id="status-message"></div>
    </div>

    <div class="dock-header">
        <span>Captured Components</span>
        <span class="count" id="dock-count">0</span>
    </div>

    <div id="dock-list" class="dock-container">
        <!-- Items rendered here -->
    </div>

    <script src="popup.js"></script>
</body>

</html>
