<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyDiv</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      min-height: 500px;
      max-height: 600px;
      background: linear-gradient(180deg, #09090b 0%, #18181b 100%);
      color: #fafafa;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .header {
      padding: 16px 20px;
      border-bottom: 1px solid #27272a;
      background: linear-gradient(180deg, rgba(139, 92, 246, 0.1) 0%, transparent 100%);
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header h1 span {
      background: linear-gradient(135deg, #8b5cf6, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      font-size: 12px;
      color: #71717a;
      margin-top: 4px;
    }

    .controls {
      padding: 16px 20px;
      display: flex;
      gap: 10px;
      border-bottom: 1px solid #27272a;
    }

    .btn {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
      color: white;
      box-shadow: 0 4px 14px -3px rgba(139, 92, 246, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px -3px rgba(139, 92, 246, 0.5);
    }

    .btn-primary.active {
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      box-shadow: 0 4px 14px -3px rgba(34, 197, 94, 0.4);
    }

    .btn-secondary {
      background: #27272a;
      color: #a1a1aa;
      border: 1px solid #3f3f46;
    }

    .btn-secondary:hover {
      background: #3f3f46;
      color: #fafafa;
    }

    .dock-container {
      height: 380px;
      overflow-y: auto;
      padding: 12px;
    }

    .dock-container::-webkit-scrollbar {
      width: 6px;
    }

    .dock-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .dock-container::-webkit-scrollbar-thumb {
      background: #3f3f46;
      border-radius: 3px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #52525b;
      text-align: center;
      padding: 40px;
    }

    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state h3 {
      font-size: 14px;
      font-weight: 600;
      color: #71717a;
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 12px;
      line-height: 1.5;
    }

    .dock-item {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 10px;
      margin-bottom: 10px;
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .dock-item:hover {
      border-color: #3f3f46;
      box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.3);
    }

    .dock-item-header {
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #09090b;
      border-bottom: 1px solid #27272a;
    }

    .dock-item-meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dock-item-source {
      font-size: 11px;
      color: #8b5cf6;
      font-weight: 500;
      background: rgba(139, 92, 246, 0.1);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .dock-item-time {
      font-size: 10px;
      color: #52525b;
    }

    .dock-item-actions {
      display: flex;
      gap: 4px;
    }

    .dock-item-actions button {
      padding: 6px 10px;
      font-size: 11px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s ease;
      font-weight: 500;
    }

    .btn-copy {
      background: #27272a;
      color: #a1a1aa;
    }

    .btn-copy:hover {
      background: #8b5cf6;
      color: white;
    }

    .btn-preview {
      background: #27272a;
      color: #a1a1aa;
    }

    .btn-preview:hover {
      background: #3f3f46;
      color: #fafafa;
    }

    .btn-delete {
      background: transparent;
      color: #52525b;
    }

    .btn-delete:hover {
      background: #ef4444;
      color: white;
    }

    .preview-container {
      padding: 12px;
      background: #0a0a0b;
      min-height: 80px;
      max-height: 150px;
      overflow: hidden;
      position: relative;
    }

    .preview-root {
      transform-origin: top left;
      overflow: hidden;
    }

    .preview-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: linear-gradient(transparent, #0a0a0b);
      pointer-events: none;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #22c55e;
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      box-shadow: 0 4px 12px -2px rgba(34, 197, 94, 0.4);
      animation: fadeInUp 0.3s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚡ <span>EasyDiv</span></h1>
    <p>Steal any UI component with Tailwind CSS</p>
  </div>

  <div class="controls">
    <button id="toggleBtn" class="btn btn-primary">
      <span>🎯</span> Start Inspector
    </button>
    <button id="clearBtn" class="btn btn-secondary">
      <span>🗑️</span> Clear All
    </button>
  </div>

  <div id="dockList" class="dock-container">
    <!-- Items will be rendered here -->
  </div>

  <script src="popup.js"></script>
</body>
</html>
