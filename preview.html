<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyDiv Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #09090b;
            color: #fafafa;
            min-height: 100vh;
        }

        .toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: rgba(9, 9, 11, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #27272a;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .toolbar h1 {
            font-size: 15px;
            font-weight: 600;
        }

        .toolbar h1 .logo {
            background: linear-gradient(135deg, #8b5cf6, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .source-badge {
            font-size: 11px;
            color: #8b5cf6;
            background: rgba(139, 92, 246, 0.1);
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .toolbar-right {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 6px 14px;
            border: none;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            color: white;
        }

        .btn-secondary {
            background: #27272a;
            color: #a1a1aa;
            border: 1px solid #3f3f46;
        }

        .btn-secondary:hover {
            background: #3f3f46;
            color: #fafafa;
        }

        #canvas {
            position: fixed;
            top: 50px;
            left: 0;
            width: 100%;
            height: calc(100vh - 50px);
            border: none;
            background: white;
        }

        .mode-switch {
            display: flex;
            background: #27272a;
            border-radius: 6px;
            padding: 2px;
            margin-right: 16px;
        }

        .mode-btn {
            background: transparent;
            border: none;
            color: #71717a;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 500;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: #3f3f46;
            color: white;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div class="toolbar">
        <div class="toolbar-left">
            <h1><span class="logo">EasyDiv</span> Preview</h1>
            <span class="source-badge" id="source-badge">Loading...</span>
        </div>
        <div class="toolbar-right">
            <div class="mode-switch">
                <button class="mode-btn active" id="mode-original">Original</button>
                <button class="mode-btn" id="mode-tailwind">Tailwind</button>
            </div>
            <button class="btn btn-primary" id="copy-btn">Copy HTML</button>
            <button class="btn btn-secondary" id="back-btn">Back</button>
        </div>
    </div>

    <iframe id="canvas"></iframe>

    <script src="preview.js"></script>
</body>

</html>
